<!DOCTYPE html>
<html lang="en">
<head>

  <title>NewJeans Chat Archive</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="floating-chat">
    <div class="float-bubble">boba!!! 🧋</div>

    <div class="msg">

        <div class="name">Danielle</div>

      <img class="avatar" src="images/haerin.jpg" alt="Haerin avatar" />

      <img class="avatar" src="images/hyein.jpg" alt="Hyein avatar" />

        <div class="name">Hyein</div>
