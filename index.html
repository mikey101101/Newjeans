<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NewJeans Chat Archive</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="chat-wrap">
    <h1 class="title">NewJeans Chat Archive</h1>
    <p class="note">Tap a bubble to open each member page.</p>

    <div class="msg">
      <img class="avatar" src="minji.jpg" alt="Minji avatar" />
      <div class="msg-content">
        <div class="name">Minji</div>
        <a href="minji.html" class="bubble small">open Minji page</a>
      </div>
    </div>

    <div class="msg">
      <img class="avatar" src="hanni.jpg" alt="Hanni avatar" />
      <div class="msg-content">
        <div class="name">Hanni</div>
        <a href="hanni.html" class="bubble small">open Hanni page</a>
      </div>
    </div>

    <div class="msg">
      <img class="avatar" src="danielle.jpg" alt="Danielle avatar" />
      <div class="msg-content">
        <div class="name">Danielle</div>
        <a href="danielle.html" class="bubble small">open Danielle page</a>
      </div>
    </div>

    <div class="msg">
      <img class="avatar" src="haerin.jpg" alt="Haerin avatar" />
      <div class="msg-content">
        <div class="name">Haerin</div>
        <a href="haerin.html" class="bubble small">open Haerin page</a>
      </div>
    </div>

    <div class="msg">
      <img class="avatar" src="hyein.jpg" alt="Hyein avatar" />
      <div class="msg-content">
        <div class="name">Hyein</div>
        <a href="hyein.html" class="bubble small">open Hyein page</a>
      </div>
    </div>
  </div>
</body>
</html>
