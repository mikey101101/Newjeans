<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>NewJeans Chat Archive</title>
  <link rel="stylesheet" href="styles.css" />
</head>
  <audio controls autoplay loop>
  <source src="music/hypeboy.mp3" type="audio/mpeg">
</audio>
<body class="home-page">
  <img id="cursor" src="bunny.png" alt="Bunny cursor" />

  <div class="floating-chat" aria-hidden="true">
    <div class="float-bubble">boba!!! 🧋</div>
    <div class="float-bubble">hehe</div>
    <div class="float-bubble">와</div>
    <div class="float-bubble">오늘 boba partyyyyy</div>
    <div class="float-bubble">bubble tea time</div>
  </div>

  <div id="notification"></div>

  <main class="page-shell">
    <section class="chat-panel">
      <div class="chat-header">
        <div class="chat-header-left">
          <div class="chat-dot"></div>
          <div>
            <h1>NewJeans Chat Archive</h1>
            <p>Live group chat</p>
          </div>
        </div>
      </div>

      <div id="live-chat" class="live-chat"></div>

      <div id="typing" class="typing hidden">
        <span></span>
        <span></span>
        <span></span>
      </div>

      <div class="member-links">
        <div class="msg">
          <img class="avatar" src="images/minji.jpg" alt="Minji avatar" />
          <div class="msg-content">
            <div class="name">Minji</div>
            <a href="minji.html" class="bubble small link-bubble">Open Minji's page</a>
          </div>
        </div>

        <div class="msg">
          <img class="avatar" src="images/hanni.jpg" alt="Hanni avatar" />
          <div class="msg-content">
            <div class="name">Hanni</div>
            <a href="hanni.html" class="bubble small link-bubble">Open Hanni's page</a>
          </div>
        </div>

        <div class="msg">
          <img class="avatar" src="images/danielle.jpg" alt="Danielle avatar" />
          <div class="msg-content">
            <div class="name">Danielle</div>
            <a href="danielle.html" class="bubble small link-bubble">Open Danielle's page</a>
          </div>
        </div>

        <div class="msg">
          <img class="avatar" src="images/haerin.jpg" alt="Haerin avatar" />
          <div class="msg-content">
            <div class="name">Haerin</div>
            <a href="haerin.html" class="bubble small link-bubble">Open Haerin's page</a>
          </div>
        </div>

        <div class="msg">
          <img class="avatar" src="images/hyein.jpg" alt="Hyein avatar" />
          <div class="msg-content">
            <div class="name">Hyein</div>
            <a href="hyein.html" class="bubble small link-bubble">Open Hyein's page</a>
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
<div class="sticker">⭐</div>
<div class="sticker">💿</div>
<div class="sticker">🐰</div>
<div class="sticker">🫧</div>
